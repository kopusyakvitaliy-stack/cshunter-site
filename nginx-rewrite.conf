# ============================================================
#  CSHunter — додати в nginx server {} блок
#  Чисті URL: /profile/76561198... → profile.php?id=...
# ============================================================

# Чисті профілі: /profile/STEAMID64
location ~ ^/profile/(\d{17})$ {
    rewrite ^/profile/(\d{17})$ /profile.php?id=$1 last;
}

# Профіль з вкладкою: /profile/STEAMID64/tab
location ~ ^/profile/(\d{17})/(profile|friends|skinchanger|items)$ {
    rewrite ^/profile/(\d{17})/(.+)$ /profile.php?id=$1&tab=$2 last;
}

# Редірект старого формату на новий (301 = постійний, для SEO)
location ~ ^/profile\.php$ {
    if ($arg_id ~ ^\d{17}$) {
        return 301 /profile/$arg_id;
    }
}
